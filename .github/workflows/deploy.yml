name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 依存パッケージをインストール
        run: npm install
      - name: ビルド
        run: npm run build
      - name: Pages の設定
        uses: actions/configure-pages@v5
      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
